name: Scan Signals

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run signal scan
        env:
          DATABASE_BACKEND: firestore
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BITGET_API_KEY: ${{ secrets.BITGET_API_KEY }}
          BITGET_API_SECRET: ${{ secrets.BITGET_API_SECRET }}
          BITGET_API_PASSPHRASE: ${{ secrets.BITGET_API_PASSPHRASE }}
          BITGET_TRADING_ENABLED: ${{ vars.BITGET_TRADING_ENABLED || 'false' }}
          BITGET_DEFAULT_ORDER_SIZE: ${{ vars.BITGET_DEFAULT_ORDER_SIZE }}
          BITGET_ORDER_SIZE_ETHUSDT: ${{ vars.BITGET_ORDER_SIZE_ETHUSDT }}
          BITGET_ORDER_SIZE_XAUUSDT: ${{ vars.BITGET_ORDER_SIZE_XAUUSDT }}
          BITGET_PRODUCT_TYPE: ${{ vars.BITGET_PRODUCT_TYPE || 'USDT-FUTURES' }}
          BITGET_MARGIN_MODE: ${{ vars.BITGET_MARGIN_MODE || 'isolated' }}
          BITGET_MARGIN_COIN: ${{ vars.BITGET_MARGIN_COIN || 'USDT' }}
          BITGET_SYMBOL_MAP: ${{ vars.BITGET_SYMBOL_MAP || 'XAUUSDT:XAUUSDT' }}
          SYMBOLS: ETHUSDT
          TIMEFRAME: 15m
          HIGHER_TIMEFRAME: 4h
          RISK_REWARD: "2.0"
          MIN_SIGNAL_SCORE: "3"
          WINRATE_ALERT_THRESHOLD: "45"
          TIMEZONE: Asia/Bangkok
          SEND_SCAN_STATUS_WHEN_NO_SIGNAL: "false"
        run: python -m src.main scan
